# Configuration Redis pour l'application de gestion commerciale

# Réseau
bind 0.0.0.0
port 6379
protected-mode yes

# Authentification
requirepass redis_password_secure_2024

# Persistance
save 900 1
save 300 10
save 60 10000

# AOF (Append Only File)
appendonly yes
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Mémoire
maxmemory 256mb
maxmemory-policy allkeys-lru

# Logs
loglevel notice
logfile ""

# Performance
tcp-keepalive 300
timeout 0

# Sécurité
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command KEYS ""
rename-command CONFIG "CONFIG_b835c3f8a5d2e7f1"

# Clients
maxclients 10000

# Slow log
slowlog-log-slower-than 10000
slowlog-max-len 128

# Latency monitoring
latency-monitor-threshold 100
