<!DOCTYPE html>
<html>
<head>
    <title>Test de connectivité</title>
</head>
<body>
    <h1>Test de connectivité</h1>
    <div id="results"></div>
    
    <script>
        async function testConnectivity() {
            const results = document.getElementById('results');
            
            // Test frontend
            try {
                const frontendResponse = await fetch('http://localhost:3000');
                results.innerHTML += `<p>✅ Frontend (3000): ${frontendResponse.status}</p>`;
            } catch (error) {
                results.innerHTML += `<p>❌ Frontend (3000): ${error.message}</p>`;
            }
            
            // Test backend health
            try {
                const backendResponse = await fetch('http://localhost:3001/health');
                results.innerHTML += `<p>✅ Backend Health (3001): ${backendResponse.status}</p>`;
            } catch (error) {
                results.innerHTML += `<p>❌ Backend Health (3001): ${error.message}</p>`;
            }
            
            // Test backend API
            try {
                const apiResponse = await fetch('http://localhost:3001/api/v1/invoices');
                results.innerHTML += `<p>✅ Backend API (3001): ${apiResponse.status}</p>`;
            } catch (error) {
                results.innerHTML += `<p>❌ Backend API (3001): ${error.message}</p>`;
            }
        }
        
        testConnectivity();
    </script>
</body>
</html>
