<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Boutons PDF Factures</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-result { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .success { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
        .info { background-color: #d1ecf1; color: #0c5460; }
        .warning { background-color: #fff3cd; color: #856404; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        .test-section { border: 1px solid #ddd; margin: 20px 0; padding: 15px; border-radius: 8px; }
        .test-section h3 { margin-top: 0; color: #333; }
        pre { background-color: #f8f9fa; padding: 10px; border-radius: 5px; overflow-x: auto; }
        .button-test { display: inline-block; margin: 5px; padding: 8px 12px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .button-test:hover { background: #0056b3; }
        .button-test:disabled { background: #6c757d; cursor: not-allowed; }
    </style>
</head>
<body>
    <h1>🧪 Test des Boutons PDF - Page Factures</h1>
    <p>Test de tous les boutons et liens PDF sur la page des factures</p>
    
    <div class="test-section">
        <h3>🔐 1. Authentification</h3>
        <button onclick="testAuthentication()" class="button-test">Tester Authentification</button>
        <div id="auth-results"></div>
    </div>

    <div class="test-section">
        <h3>📋 2. Liste des Factures</h3>
        <button onclick="testInvoicesList()" class="button-test">Charger Liste Factures</button>
        <div id="invoices-results"></div>
    </div>

    <div class="test-section">
        <h3>📄 3. Boutons PDF Individuels</h3>
        <button onclick="testIndividualPDFButtons()" class="button-test">Tester PDF Individuels</button>
        <div id="individual-pdf-results"></div>
    </div>

    <div class="test-section">
        <h3>📊 4. Export PDF Global</h3>
        <button onclick="testGlobalPDFExport()" class="button-test">Tester Export Global PDF</button>
        <div id="global-pdf-results"></div>
    </div>

    <div class="test-section">
        <h3>📧 5. Envoi Email avec PDF</h3>
        <button onclick="testEmailPDF()" class="button-test">Tester Envoi Email</button>
        <div id="email-pdf-results"></div>
    </div>

    <div class="test-section">
        <h3>🔗 6. Endpoints Backend PDF</h3>
        <button onclick="testBackendPDFEndpoints()" class="button-test">Tester Endpoints Backend</button>
        <div id="backend-pdf-results"></div>
    </div>

    <div class="test-section">
        <h3>📈 7. Résumé des Tests</h3>
        <button onclick="runAllTests()" class="button-test" style="background: #28a745;">Exécuter Tous les Tests</button>
        <button onclick="clearResults()" class="button-test" style="background: #dc3545;">Effacer Résultats</button>
        <div id="summary-results"></div>
    </div>

    <script>
        let authToken = null;
        let testInvoices = [];
        let testResults = {
            auth: false,
            invoicesList: false,
            individualPDF: false,
            globalPDF: false,
            emailPDF: false,
            backendPDF: false
        };

        function addResult(containerId, message, type = 'info') {
            const container = document.getElementById(containerId);
            const div = document.createElement('div');
            div.className = `test-result ${type}`;
            div.innerHTML = message;
            container.appendChild(div);
        }

        function clearResults() {
            const containers = ['auth-results', 'invoices-results', 'individual-pdf-results', 
                              'global-pdf-results', 'email-pdf-results', 'backend-pdf-results', 'summary-results'];
            containers.forEach(id => {
                document.getElementById(id).innerHTML = '';
            });
            testResults = {
                auth: false,
                invoicesList: false,
                individualPDF: false,
                globalPDF: false,
                emailPDF: false,
                backendPDF: false
            };
        }

        async function testAuthentication() {
            try {
                addResult('auth-results', '🔐 Test d\'authentification...', 'info');
                
                const response = await fetch('http://localhost:3001/api/v1/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: 'admin@technocommerce.dz',
                        password: 'Admin123!'
                    }),
                });

                if (response.ok) {
                    const data = await response.json();
                    authToken = data.data.tokens.accessToken;
                    testResults.auth = true;
                    addResult('auth-results', '✅ Authentification réussie', 'success');
                    addResult('auth-results', `🔑 Token: ${authToken.substring(0, 20)}...`, 'info');
                } else {
                    throw new Error(`Erreur ${response.status}`);
                }
            } catch (error) {
                testResults.auth = false;
                addResult('auth-results', `❌ Erreur authentification: ${error.message}`, 'error');
            }
        }

        async function testInvoicesList() {
            if (!authToken) {
                addResult('invoices-results', '❌ Authentification requise', 'error');
                return;
            }

            try {
                addResult('invoices-results', '📋 Chargement de la liste des factures...', 'info');
                
                const response = await fetch('http://localhost:3001/api/v1/invoices', {
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    testInvoices = data.data || [];
                    testResults.invoicesList = true;
                    addResult('invoices-results', `✅ ${testInvoices.length} facture(s) trouvée(s)`, 'success');
                    
                    if (testInvoices.length > 0) {
                        addResult('invoices-results', `📄 Première facture: ${testInvoices[0].number} (ID: ${testInvoices[0].id})`, 'info');
                    } else {
                        addResult('invoices-results', '⚠️ Aucune facture disponible pour les tests PDF', 'warning');
                    }
                } else {
                    throw new Error(`Erreur ${response.status}`);
                }
            } catch (error) {
                testResults.invoicesList = false;
                addResult('invoices-results', `❌ Erreur chargement factures: ${error.message}`, 'error');
            }
        }

        async function testIndividualPDFButtons() {
            if (!authToken) {
                addResult('individual-pdf-results', '❌ Authentification requise', 'error');
                return;
            }

            if (testInvoices.length === 0) {
                addResult('individual-pdf-results', '⚠️ Aucune facture disponible pour tester les PDF', 'warning');
                return;
            }

            try {
                addResult('individual-pdf-results', '📄 Test des boutons PDF individuels...', 'info');
                
                // Tester le premier PDF de facture
                const testInvoice = testInvoices[0];
                const response = await fetch(`http://localhost:3001/api/v1/invoices/${testInvoice.id}/pdf`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                    }
                });

                if (response.ok) {
                    const contentType = response.headers.get('content-type');
                    const contentLength = response.headers.get('content-length');
                    
                    testResults.individualPDF = true;
                    addResult('individual-pdf-results', `✅ PDF généré pour facture ${testInvoice.number}`, 'success');
                    addResult('individual-pdf-results', `📊 Type: ${contentType}, Taille: ${contentLength} bytes`, 'info');
                    
                    // Test du téléchargement
                    const blob = await response.blob();
                    if (blob.size > 0) {
                        addResult('individual-pdf-results', '✅ Téléchargement PDF fonctionnel', 'success');
                    } else {
                        addResult('individual-pdf-results', '❌ PDF vide généré', 'error');
                    }
                } else {
                    throw new Error(`Erreur ${response.status}`);
                }
            } catch (error) {
                testResults.individualPDF = false;
                addResult('individual-pdf-results', `❌ Erreur PDF individuel: ${error.message}`, 'error');
            }
        }

        async function testGlobalPDFExport() {
            if (!authToken) {
                addResult('global-pdf-results', '❌ Authentification requise', 'error');
                return;
            }

            try {
                addResult('global-pdf-results', '📊 Test de l\'export PDF global...', 'info');
                
                const response = await fetch('http://localhost:3001/api/v1/exports/invoices/pdf', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        filters: {},
                        format: 'list'
                    })
                });

                if (response.ok) {
                    testResults.globalPDF = true;
                    addResult('global-pdf-results', '✅ Export PDF global fonctionnel', 'success');
                } else if (response.status === 404) {
                    addResult('global-pdf-results', '⚠️ Endpoint export PDF global non implémenté', 'warning');
                } else {
                    throw new Error(`Erreur ${response.status}`);
                }
            } catch (error) {
                testResults.globalPDF = false;
                addResult('global-pdf-results', `❌ Erreur export global: ${error.message}`, 'error');
            }
        }

        async function testEmailPDF() {
            if (!authToken || testInvoices.length === 0) {
                addResult('email-pdf-results', '❌ Authentification et factures requises', 'error');
                return;
            }

            try {
                addResult('email-pdf-results', '📧 Test de l\'envoi email avec PDF...', 'info');
                
                const testInvoice = testInvoices[0];
                const response = await fetch(`http://localhost:3001/api/v1/invoices/${testInvoice.id}/send-email`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        to: 'test@example.com',
                        subject: 'Test envoi facture PDF',
                        includePDF: true
                    })
                });

                if (response.ok) {
                    testResults.emailPDF = true;
                    addResult('email-pdf-results', '✅ Envoi email avec PDF fonctionnel', 'success');
                } else if (response.status === 404) {
                    addResult('email-pdf-results', '⚠️ Endpoint envoi email non implémenté', 'warning');
                } else {
                    throw new Error(`Erreur ${response.status}`);
                }
            } catch (error) {
                testResults.emailPDF = false;
                addResult('email-pdf-results', `❌ Erreur envoi email: ${error.message}`, 'error');
            }
        }

        async function testBackendPDFEndpoints() {
            if (!authToken) {
                addResult('backend-pdf-results', '❌ Authentification requise', 'error');
                return;
            }

            const endpoints = [
                { url: '/api/v1/invoices/templates/pdf', name: 'Template PDF' },
                { url: '/api/v1/exports/invoices/pdf', name: 'Export Liste PDF' },
                { url: '/api/v1/reports/sales/pdf', name: 'Rapport Ventes PDF' }
            ];

            addResult('backend-pdf-results', '🔗 Test des endpoints backend PDF...', 'info');
            let successCount = 0;

            for (const endpoint of endpoints) {
                try {
                    const response = await fetch(`http://localhost:3001${endpoint.url}`, {
                        method: 'GET',
                        headers: {
                            'Authorization': `Bearer ${authToken}`,
                            'Content-Type': 'application/json'
                        }
                    });

                    if (response.ok) {
                        addResult('backend-pdf-results', `✅ ${endpoint.name} - Fonctionnel`, 'success');
                        successCount++;
                    } else if (response.status === 404) {
                        addResult('backend-pdf-results', `⚠️ ${endpoint.name} - Non implémenté`, 'warning');
                    } else {
                        addResult('backend-pdf-results', `❌ ${endpoint.name} - Erreur ${response.status}`, 'error');
                    }
                } catch (error) {
                    addResult('backend-pdf-results', `❌ ${endpoint.name} - ${error.message}`, 'error');
                }
            }

            testResults.backendPDF = successCount > 0;
        }

        async function runAllTests() {
            clearResults();
            addResult('summary-results', '🚀 Exécution de tous les tests...', 'info');
            
            await testAuthentication();
            await new Promise(resolve => setTimeout(resolve, 1000));
            
            await testInvoicesList();
            await new Promise(resolve => setTimeout(resolve, 1000));
            
            await testIndividualPDFButtons();
            await new Promise(resolve => setTimeout(resolve, 1000));
            
            await testGlobalPDFExport();
            await new Promise(resolve => setTimeout(resolve, 1000));
            
            await testEmailPDF();
            await new Promise(resolve => setTimeout(resolve, 1000));
            
            await testBackendPDFEndpoints();
            
            // Résumé final
            const successCount = Object.values(testResults).filter(Boolean).length;
            const totalTests = Object.keys(testResults).length;
            
            addResult('summary-results', `📊 Résumé: ${successCount}/${totalTests} tests réussis`, 
                     successCount === totalTests ? 'success' : 'warning');
            
            if (testResults.auth) addResult('summary-results', '✅ Authentification', 'success');
            if (testResults.invoicesList) addResult('summary-results', '✅ Liste factures', 'success');
            if (testResults.individualPDF) addResult('summary-results', '✅ PDF individuels', 'success');
            if (testResults.globalPDF) addResult('summary-results', '✅ Export PDF global', 'success');
            if (testResults.emailPDF) addResult('summary-results', '✅ Email PDF', 'success');
            if (testResults.backendPDF) addResult('summary-results', '✅ Endpoints backend', 'success');
        }

        // Test automatique au chargement
        window.onload = function() {
            addResult('summary-results', '🧪 Page de test des boutons PDF chargée. Cliquez sur "Exécuter Tous les Tests" pour commencer.', 'info');
        };
    </script>
</body>
</html>
