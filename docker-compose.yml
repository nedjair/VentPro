name: ventespro

services:
  # PostgreSQL 16 - Base de données principale
  postgres:
    image: postgres:16-alpine
    container_name: ventespro-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gestion_commerciale_tpe}
      POSTGRES_USER: ${POSTGRES_USER:-tpe_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tpe_password_2024}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=fr_FR.UTF-8"
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    networks:
      - ventespro-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tpe_user} -d ${POSTGRES_DB:-gestion_commerciale_tpe}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PgBouncer - Connection pooling pour PostgreSQL
  pgbouncer:
    image: pgbouncer/pgbouncer:latest
    container_name: ventespro-pgbouncer
    restart: unless-stopped
    environment:
      DATABASES_HOST: postgres
      DATABASES_PORT: 5432
      DATABASES_USER: ${POSTGRES_USER:-tpe_user}
      DATABASES_PASSWORD: ${PGBOUNCER_PASSWORD:-${POSTGRES_PASSWORD:-tpe_password_2024}}
      DATABASES_DBNAME: ${POSTGRES_DB:-gestion_commerciale_tpe}
      POOL_MODE: transaction
      SERVER_RESET_QUERY: DISCARD ALL
      MAX_CLIENT_CONN: 100
      DEFAULT_POOL_SIZE: 20
      MIN_POOL_SIZE: 5
      RESERVE_POOL_SIZE: 5
      SERVER_LIFETIME: 3600
      SERVER_IDLE_TIMEOUT: 600
    ports:
      - "6432:5432"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ventespro-network

  # Adminer - Interface d'administration de base de données (développement uniquement)
  adminer:
    image: adminer:latest
    container_name: ventespro-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: pepa-linha
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ventespro-network
    profiles:
      - dev

  # Backend API - Node.js avec Fastify
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      target: development
    container_name: ventespro-backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER:-tpe_user}:${POSTGRES_PASSWORD:-tpe_password_2024}@postgres:5432/${POSTGRES_DB:-gestion_commerciale_tpe}
      DIRECT_DATABASE_URL: postgresql://${POSTGRES_USER:-tpe_user}:${POSTGRES_PASSWORD:-tpe_password_2024}@postgres:5432/${POSTGRES_DB:-gestion_commerciale_tpe}
      # Secrets lus depuis le .env
      JWT_SECRET: ${JWT_SECRET:-change-this-development-jwt-secret-min-32-chars}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-this-development-refresh-secret-min-32ch}
      # Origine navigateur autorisée pour le frontend exposé sur l'hôte local.
      CORS_ORIGIN: http://localhost:3000,http://127.0.0.1:3000
      PORT: 3001
      HOST: 0.0.0.0
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ventespro-network
    # Plus de volumes pour le code source :
    # Les fichiers de Windows avec pnpm écrasent les liens symboliques Linux
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

  # Frontend - Next.js
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      target: development
    container_name: ventespro-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      # Utilisé uniquement par le serveur Next.js pour proxyfier les routes API.
      # Important en Docker : `localhost` viserait le conteneur frontend lui-même.
      INTERNAL_API_BASE_URL: http://backend:3001
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ventespro-network
    # Plus de volumes pour le code source :
    # Les fichiers de Windows avec pnpm écrasent les liens symboliques Linux
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

  # Redis - Cache et Pub/Sub
  redis:
    image: redis:7-alpine
    container_name: ventespro-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_password_secure_2024}
    ports:
      - "6379:6379"
    networks:
      - ventespro-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_password_secure_2024}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    name: ventespro_postgres_data
    driver: local

networks:
  ventespro-network:
    name: ventespro-network
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.10.0/24
