version: '3.8'

services:
  # PostgreSQL 16 - Base de données principale
  postgres:
    image: postgres:16-alpine
    container_name: gestion-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: gestion_commerciale
      POSTGRES_USER: gestion_user
      POSTGRES_PASSWORD: gestion_password_secure_2024
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=fr_FR.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    networks:
      - gestion-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gestion_user -d gestion_commerciale"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PgBouncer - Connection pooling pour PostgreSQL
  pgbouncer:
    image: pgbouncer/pgbouncer:latest
    container_name: gestion-pgbouncer
    restart: unless-stopped
    environment:
      DATABASES_HOST: postgres
      DATABASES_PORT: 5432
      DATABASES_USER: gestion_user
      DATABASES_PASSWORD: gestion_password_secure_2024
      DATABASES_DBNAME: gestion_commerciale
      POOL_MODE: transaction
      SERVER_RESET_QUERY: DISCARD ALL
      MAX_CLIENT_CONN: 100
      DEFAULT_POOL_SIZE: 20
      MIN_POOL_SIZE: 5
      RESERVE_POOL_SIZE: 5
      SERVER_LIFETIME: 3600
      SERVER_IDLE_TIMEOUT: 600
    ports:
      - "6432:5432"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gestion-network

  # Redis 7 - Cache et sessions
  redis:
    image: redis:7-alpine
    container_name: gestion-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass redis_password_secure_2024
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - gestion-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Adminer - Interface d'administration de base de données (développement uniquement)
  adminer:
    image: adminer:latest
    container_name: gestion-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: pepa-linha
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gestion-network
    profiles:
      - dev

  # Redis Commander - Interface d'administration Redis (développement uniquement)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: gestion-redis-commander
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      REDIS_HOSTS: local:redis:6379:0:redis_password_secure_2024
      HTTP_USER: admin
      HTTP_PASSWORD: admin_password_2024
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - gestion-network
    profiles:
      - dev

  # Backend API - Node.js avec Fastify
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      target: development
    container_name: gestion-backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://gestion_user:gestion_password_secure_2024@postgres:5432/gestion_commerciale
      DIRECT_DATABASE_URL: postgresql://gestion_user:gestion_password_secure_2024@postgres:5432/gestion_commerciale
      REDIS_URL: redis://:redis_password_secure_2024@redis:6379
      JWT_SECRET: your_jwt_secret_key_here_2024
      JWT_REFRESH_SECRET: your_jwt_refresh_secret_key_here_2024
      PORT: 3001
      HOST: 0.0.0.0
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gestion-network
    volumes:
      - ./apps/backend/src:/app/apps/backend/src:ro
      - ./packages:/app/packages:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

  # Frontend - Vite React
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      target: development
    container_name: gestion-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      VITE_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - gestion-network
    volumes:
      - ./apps/frontend/src:/app/src:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  gestion-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
