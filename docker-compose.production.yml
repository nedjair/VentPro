services:
  # PostgreSQL - Base de données
  postgres:
    image: postgres:16-alpine
    container_name: gestion_postgres_prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: gestion_commerciale
      POSTGRES_USER: gestion_user
      POSTGRES_PASSWORD: gestion_password_2024
    ports:
      - "5432:5432"
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gestion_user -d gestion_commerciale"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis - Cache et sessions
  redis:
    image: redis:7-alpine
    container_name: gestion_redis_prod
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Backend API - Production optimisé
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile.prod
    container_name: gestion_backend_prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://gestion_user:gestion_password_2024@postgres:5432/gestion_commerciale
      REDIS_URL: redis://redis:6379
      JWT_SECRET: jwt-secret-production-2024-change-this-in-real-production
      JWT_REFRESH_SECRET: jwt-refresh-secret-production-2024-change-this
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Frontend - Application React/Vue complète
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile.prod
    container_name: gestion_frontend_prod
    restart: unless-stopped
    environment:
      REACT_APP_API_URL: http://localhost:3001
      REACT_APP_ENV: production
    ports:
      - "3000:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx - Reverse proxy et serveur web
  nginx:
    image: nginx:alpine
    container_name: gestion_nginx_prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/production.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend

volumes:
  postgres_prod_data:
  redis_prod_data: