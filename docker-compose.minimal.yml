services:
  postgres:
    image: postgres:15
    container_name: gestion-postgres-minimal
    environment:
      POSTGRES_DB: gestion_commerciale
      POSTGRES_USER: gestion_user
      POSTGRES_PASSWORD: gestion_password_123
    ports:
      - "5432:5432"
    volumes:
      - postgres_minimal_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: gestion-redis-minimal
    ports:
      - "6379:6379"

volumes:
  postgres_minimal_data: