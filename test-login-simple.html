<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Login API</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .result { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .success { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
        .info { background-color: #d1ecf1; color: #0c5460; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 5px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>🧪 Test de l'API d'authentification</h1>
    
    <div>
        <button onclick="testHealth()">1️⃣ Test Health</button>
        <button onclick="testLogin()">2️⃣ Test Login</button>
        <button onclick="testSuppliersNoAuth()">3️⃣ Test Suppliers (sans auth)</button>
        <button onclick="testSuppliersWithAuth()">4️⃣ Test Suppliers (avec auth)</button>
        <button onclick="clearResults()">🗑️ Effacer</button>
    </div>
    
    <div id="results"></div>

    <script>
        const API_BASE = 'http://localhost:3001';
        let authToken = null;

        function addResult(message, type = 'info') {
            const div = document.createElement('div');
            div.className = `result ${type}`;
            div.innerHTML = message;
            document.getElementById('results').appendChild(div);
        }

        function clearResults() {
            document.getElementById('results').innerHTML = '';
        }

        async function testHealth() {
            try {
                addResult('🔄 Test de santé du serveur...', 'info');
                
                const response = await fetch(`${API_BASE}/health`);
                const data = await response.json();
                
                if (response.ok) {
                    addResult(`✅ Serveur accessible - Status: ${data.status}, Uptime: ${Math.round(data.uptime)}s`, 'success');
                } else {
                    addResult(`❌ Erreur serveur: ${response.status}`, 'error');
                }
            } catch (error) {
                addResult(`❌ Erreur de connexion: ${error.message}`, 'error');
            }
        }

        async function testLogin() {
            try {
                addResult('🔄 Test de connexion...', 'info');
                
                const response = await fetch(`${API_BASE}/api/v1/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: 'admin@test.com',
                        password: 'password123'
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    authToken = data.data.tokens.accessToken;
                    addResult(`✅ Connexion réussie !`, 'success');
                    addResult(`🔑 Token reçu: ${authToken.substring(0, 50)}...`, 'info');
                    addResult(`👤 Utilisateur: ${data.data.user.firstName} ${data.data.user.lastName} (${data.data.user.role})`, 'info');
                } else {
                    addResult(`❌ Échec de connexion: ${data.message}`, 'error');
                    addResult(`<pre>${JSON.stringify(data, null, 2)}</pre>`, 'error');
                }
            } catch (error) {
                addResult(`❌ Erreur lors de la connexion: ${error.message}`, 'error');
            }
        }

        async function testSuppliersNoAuth() {
            try {
                addResult('🔄 Test API fournisseurs sans authentification...', 'info');
                
                const response = await fetch(`${API_BASE}/api/v1/suppliers`);
                
                if (response.status === 401) {
                    addResult(`✅ Authentification requise (comportement normal) - Status: ${response.status}`, 'success');
                } else if (response.status === 500) {
                    const errorText = await response.text();
                    addResult(`❌ ERREUR 500 DÉTECTÉE !`, 'error');
                    addResult(`<pre>${errorText}</pre>`, 'error');
                } else {
                    const data = await response.text();
                    addResult(`⚠️ Réponse inattendue: ${response.status}`, 'error');
                    addResult(`<pre>${data}</pre>`, 'info');
                }
            } catch (error) {
                addResult(`❌ Erreur: ${error.message}`, 'error');
            }
        }

        async function testSuppliersWithAuth() {
            if (!authToken) {
                addResult('❌ Aucun token disponible. Connectez-vous d\'abord !', 'error');
                return;
            }

            try {
                addResult('🔄 Test API fournisseurs avec authentification...', 'info');
                
                const response = await fetch(`${API_BASE}/api/v1/suppliers`, {
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                        'Content-Type': 'application/json'
                    }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    addResult(`✅ API fournisseurs fonctionne !`, 'success');
                    addResult(`📊 Fournisseurs trouvés: ${data.data?.suppliers?.length || 0}`, 'info');
                    addResult(`<pre>${JSON.stringify(data, null, 2)}</pre>`, 'info');
                } else if (response.status === 500) {
                    const errorText = await response.text();
                    addResult(`❌ ERREUR 500 AVEC AUTHENTIFICATION !`, 'error');
                    addResult(`<pre>${errorText}</pre>`, 'error');
                } else {
                    const errorText = await response.text();
                    addResult(`⚠️ Erreur ${response.status}: ${errorText}`, 'error');
                }
            } catch (error) {
                addResult(`❌ Erreur: ${error.message}`, 'error');
            }
        }
    </script>
</body>
</html>
