name: ventespro

services:
  # PostgreSQL 16 - Base de données principale
  postgres:
    image: postgres:16-alpine
    container_name: ventespro-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: gestion_commerciale_tpe
      POSTGRES_USER: tpe_user
      POSTGRES_PASSWORD: tpe_password_2024
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ventespro-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tpe_user -d gestion_commerciale_tpe"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    name: ventespro_postgres_data
    driver: local

networks:
  ventespro-network:
    name: ventespro-network
    driver: bridge
